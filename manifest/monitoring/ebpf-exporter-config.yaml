apiVersion: v1
kind: ConfigMap
metadata:
  name: ebpf-exporter-config
  namespace: monitoring
data:
  syscalls.yaml: |
    metrics:
      counters:
        - name: syscall_total
          help: Total number of syscalls
          map: syscalls_map
          label_names:
            - name: pid
              size: 4
              decoders:
                - name: uint32
    code: |
      #include <linux/sched.h>
      BPF_HASH(syscalls_map, u32, u64);

      int kprobe__sys_clone(void *ctx) {
          u32 pid = bpf_get_current_pid_tgid() >> 32;
          u64 *val, zero = 0;
          val = syscalls_map.lookup_or_try_init(&pid, &zero);
          if (val) {
              (*val)++;
          }
          return 0;
      }
