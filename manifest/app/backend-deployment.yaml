apiVersion: apps/v1
kind: Deployment
metadata:
  name: yjmatzip-backend
  namespace: yjmatzip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yjmatzip-backend
  template:
    metadata:
      labels:
        app: yjmatzip-backend
    spec:
      containers:
      - name: backend
        # 1. 방금 빌드해서 푸시한 진짜 이미지 주소로 교체합니다.
        image: whdnduf/yjmatzip-backend:20260303-1557
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        # 2. command는 이미지의 Dockerfile에 이미 정의되어 있으므로 삭제합니다.
        # 3. 데이터베이스(PostgreSQL) 접속 정보를 환경 변수로 주입합니다.
        env:
        - name: DB_HOST
          value: "postgres-svc.yjmatzip.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "yjmatzip"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        resources:
          limits:
            memory: "512Mi" # Node.js 앱의 안정성을 위해 메모리 제한을 조금 늘리는 것을 추천합니다.
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: yjmatzip-backend-svc
  namespace: yjmatzip
spec:
  selector:
    app: yjmatzip-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
