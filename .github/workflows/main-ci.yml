name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'yjmatzip-backend/**' # 백엔드 코드 변경 시에만 작동

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_TOKEN }} # 자기 자신에게 push하기 위한 토큰

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # 시간 기반 태그 생성 (예: 20260303-1830)
          TAG=$(date +%Y%m%d-%H%M)
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/yjmatzip-backend
          
          docker build -t $IMAGE_NAME:$TAG ./yjmatzip-backend
          docker push $IMAGE_NAME:$TAG
          
          # manifest 폴더의 YAML 파일 안의 이미지 태그를 최신으로 교체 (GitOps의 핵심)
          sed -i "s|image: .*yjmatzip-backend:.*|image: $IMAGE_NAME:$TAG|g" manifest/app/backend-deployment.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add manifest/app/backend-deployment.yaml
          git commit -m "chore: update backend image to latest tag"
          git push
