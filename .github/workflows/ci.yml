name: Build and Deploy Backend

on:
  push:
    paths:
      - 'yjmatzip-backend/**'  # 백엔드 코드가 바뀔 때만 실행
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTION_TOKEN }} # 내 레포에 다시 Commit하기 위한 권한

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          # 현재 시간을 태그로 사용 (예: 20260303-1430)
          TAG=$(date +%Y%m%d-%H%M)
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yjmatzip-backend:$TAG ./yjmatzip-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yjmatzip-backend:$TAG
          
          # manifest 폴더의 YAML 파일 내용 수정 (이미지 태그 업데이트)
          # sed 명령어로 manifest/app/backend-deploy.yaml의 이미지 부분을 교체합니다.
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/yjmatzip-backend:$TAG|g" manifest/app/backend-deployment.yaml

      - name: Commit and Push Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add manifest/app/backend-deployment.yaml
          git commit -m "chore: update backend image tag"
          git push
